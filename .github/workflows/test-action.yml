name: Test ArcSim Action

on:
  pull_request:
    paths:
      - 'examples/**/*.yaml'
      - 'examples/**/*.yml'
      - 'examples/**/*.tf'

permissions:
  contents: read
  pull-requests: write

jobs:
  test-arcsim-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run ArcSim Action
        uses: ./
        with:
          fail-on-critical: 'false'
